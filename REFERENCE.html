<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cendra · GTM Engine — Operator Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* =========================================================================
   CENDRA GTM ENGINE — DESIGN SYSTEM
   "Operator's Console" — a dark mission-control for an autonomous lead refinery
   Type:  Plus Jakarta Sans (UI) · IBM Plex Mono (all data, metrics, IDs, codes)
   ========================================================================= */
:root{
  /* --- ink & surfaces --- */
  --bg:#0A0D12;
  --bg-raised:#0E131A;
  --surface:#121821;
  --surface-2:#172029;
  --surface-3:#1C2731;
  --border:#222C38;
  --border-strong:#30404F;
  --border-soft:#1A222C;

  /* --- text --- */
  --text:#EAEEF4;
  --text-dim:#9CA9BA;
  --text-mute:#65748A;
  --text-faint:#465162;

  /* --- brand (AI / autonomy / primary action / live) --- */
  --brand:#7C76FF;
  --brand-bright:#9D98FF;
  --brand-deep:#5950E6;
  --brand-ghost:rgba(124,118,255,.12);
  --brand-ghost-2:rgba(124,118,255,.22);

  /* --- accent (energy / throughput / spend / the engine's "heat") --- */
  --accent:#F5B13D;
  --accent-soft:rgba(245,177,61,.14);

  /* --- semantic + pipeline-stage spectrum (cold raw -> warm processing -> green good -> cyan done) --- */
  --raw:#5E6E83;       --raw-bg:rgba(94,110,131,.14);
  --clean:#4FA0F0;     --clean-bg:rgba(79,160,240,.14);
  --ready:#38BDF8;     --ready-bg:rgba(56,189,248,.14);
  --enrich:#8B7BFF;    --enrich-bg:rgba(139,123,255,.14);
  --pending:#F5B13D;   --pending-bg:rgba(245,177,61,.14);
  --scored:#5FD0C0;    --scored-bg:rgba(95,208,192,.14);
  --good:#35D399;      --good-bg:rgba(53,211,153,.14);
  --synced:#22D3EE;    --synced-bg:rgba(34,211,238,.14);
  --bad:#FB6F84;       --bad-bg:rgba(251,111,132,.14);

  --success:var(--good);
  --warning:var(--pending);
  --error:var(--bad);
  --info:var(--clean);

  /* --- radius (rounded, generous) --- */
  --r-xs:6px; --r-sm:9px; --r-md:13px; --r-lg:17px; --r-xl:22px; --r-pill:999px;

  /* --- elevation (border-led, observability-style — soft, not heavy material) --- */
  --shadow-1:0 1px 0 rgba(255,255,255,.02) inset, 0 1px 2px rgba(0,0,0,.35);
  --shadow-2:0 8px 30px -12px rgba(0,0,0,.6), 0 2px 8px -4px rgba(0,0,0,.5);
  --shadow-pop:0 24px 60px -18px rgba(0,0,0,.7), 0 8px 24px -10px rgba(0,0,0,.6);
  --glow-brand:0 0 0 1px rgba(124,118,255,.35), 0 8px 28px -8px rgba(124,118,255,.45);

  /* --- type --- */
  --ui:"Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
  --mono:"IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* --- motion --- */
  --fast:150ms cubic-bezier(.4,0,.2,1);
  --med:260ms cubic-bezier(.2,.6,.2,1);

  --sidebar-w:236px;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1100px 600px at 78% -8%, rgba(124,118,255,.10), transparent 60%),
    radial-gradient(900px 500px at -6% 4%, rgba(34,211,238,.05), transparent 55%),
    var(--bg);
  color:var(--text);
  font-family:var(--ui);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  letter-spacing:-.01em;
}
::selection{background:var(--brand-ghost-2);color:#fff}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
.mono{font-family:var(--mono);font-feature-settings:"tnum" 1,"zero" 1}

/* scrollbar */
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-thumb{background:#222d39;border-radius:99px;border:2px solid var(--bg)}
*::-webkit-scrollbar-thumb:hover{background:#2c3a49}
*::-webkit-scrollbar-track{background:transparent}

/* ---------- shell ---------- */
.app,#root{display:flex;min-height:100vh}
.sidebar{
  width:var(--sidebar-w);flex:0 0 var(--sidebar-w);
  position:sticky;top:0;height:100vh;
  background:linear-gradient(180deg,#0C1117,#0A0E13);
  border-right:1px solid var(--border-soft);
  display:flex;flex-direction:column;padding:18px 14px;z-index:30;
}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px;margin-bottom:6px}
.brand-mark{
  width:34px;height:34px;border-radius:10px;flex:0 0 34px;position:relative;
  background:conic-gradient(from 220deg,var(--brand),var(--synced),var(--accent),var(--brand));
  box-shadow:0 0 0 1px rgba(255,255,255,.06), 0 6px 16px -6px rgba(124,118,255,.6);
  display:grid;place-items:center;
}
.brand-mark::after{content:"";position:absolute;inset:5px;border-radius:6px;background:#0B0F14}
.brand-mark svg{position:relative;z-index:2}
.brand-name{font-weight:800;font-size:14.5px;letter-spacing:-.02em;line-height:1.05}
.brand-sub{font-family:var(--mono);font-size:9.5px;color:var(--text-mute);letter-spacing:.14em;text-transform:uppercase;margin-top:2px}

.nav{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.nav-label{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);padding:14px 10px 6px}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:var(--r-sm);
  color:var(--text-dim);font-weight:500;font-size:13px;transition:all var(--fast);position:relative;
}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:var(--brand-ghost);color:#fff}
.nav-item.active::before{content:"";position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:0 3px 3px 0;background:var(--brand)}
.nav-item .ic{width:17px;height:17px;flex:0 0 17px;opacity:.9}
.nav-item.active .ic{color:var(--brand-bright)}
.nav-badge{margin-left:auto;font-family:var(--mono);font-size:10px;background:var(--surface-2);color:var(--text-dim);padding:1px 7px;border-radius:var(--r-pill);border:1px solid var(--border)}
.nav-badge.alert{background:var(--bad-bg);color:#ffb3bf;border-color:rgba(251,111,132,.3)}
.sidebar-foot{margin-top:auto;padding:10px 8px 2px;border-top:1px solid var(--border-soft)}
.user-chip{display:flex;align-items:center;gap:10px;padding:7px;border-radius:var(--r-sm);transition:background var(--fast)}
.user-chip:hover{background:var(--surface)}
.avatar{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--brand-deep),var(--brand));display:grid;place-items:center;font-weight:700;font-size:12px;color:#fff;flex:0 0 28px}
.user-chip .nm{font-size:12.5px;font-weight:600;line-height:1.1}
.user-chip .rl{font-family:var(--mono);font-size:9.5px;color:var(--text-mute)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}

/* ---------- topbar ---------- */
.topbar{
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;gap:16px;
  padding:13px 26px;background:rgba(10,13,18,.82);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border-soft);
}
.crumbs{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-mute)}
.crumbs .here{color:var(--text);font-weight:600}
.crumbs .sep{color:var(--text-faint)}
.search{
  margin-left:6px;flex:1;max-width:420px;display:flex;align-items:center;gap:9px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-pill);
  padding:8px 14px;color:var(--text-mute);transition:all var(--fast);
}
.search:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-ghost)}
.search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:13px}
.search input::placeholder{color:var(--text-faint)}
.search kbd{font-family:var(--mono);font-size:10px;color:var(--text-mute);border:1px solid var(--border);border-radius:5px;padding:1px 5px;background:var(--bg)}
.top-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.live{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--text-dim);
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-pill);padding:6px 12px 6px 10px}
.live .dot{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 0 0 rgba(53,211,153,.6);animation:pulse 2.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(53,211,153,.5)}70%{box-shadow:0 0 0 7px rgba(53,211,153,0)}100%{box-shadow:0 0 0 0 rgba(53,211,153,0)}}
.live b{color:var(--good);font-weight:600}
.refresh-toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim)}
.icon-btn{width:34px;height:34px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);display:grid;place-items:center;color:var(--text-dim);transition:all var(--fast)}
.icon-btn:hover{color:var(--text);border-color:var(--border-strong);background:var(--surface-2)}

/* ---------- page scaffolding ---------- */
.page{display:none;padding:26px 26px 64px;max-width:1480px;width:100%;margin:0 auto;animation:fade .4s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--brand-bright);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.eyebrow::before{content:"";width:14px;height:1px;background:var(--brand)}
.h1{font-size:25px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.sub{color:var(--text-mute);font-size:13.5px;margin-top:5px;max-width:62ch}
.head-actions{display:flex;gap:9px;align-items:center}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:13px;padding:9px 15px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all var(--fast);white-space:nowrap}
.btn:hover{border-color:var(--border-strong);background:var(--surface-2)}
.btn .ic{width:15px;height:15px}
.btn.primary{background:linear-gradient(180deg,var(--brand),var(--brand-deep));border-color:transparent;color:#fff;box-shadow:0 6px 18px -8px rgba(124,118,255,.7)}
.btn.primary:hover{filter:brightness(1.08)}
.btn.accent{background:linear-gradient(180deg,#F7BD56,#E09A22);border-color:transparent;color:#3a2606;box-shadow:0 6px 18px -8px rgba(245,177,61,.6)}
.btn.danger{background:var(--bad-bg);border-color:rgba(251,111,132,.34);color:#ffb3bf}
.btn.danger:hover{background:rgba(251,111,132,.2)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--text-dim)}
.btn.ghost:hover{background:var(--surface);color:var(--text)}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:var(--r-xs)}
.btn[disabled]{opacity:.45;pointer-events:none}

/* ---------- cards & grid ---------- */
.grid{display:grid;gap:16px}
.card{background:linear-gradient(180deg,var(--surface),var(--bg-raised));border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-1)}
.card.pad{padding:18px}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--border-soft)}
.card-title{font-weight:700;font-size:14px;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
.card-title .ic{width:16px;height:16px;color:var(--text-mute)}
.card-meta{font-family:var(--mono);font-size:11px;color:var(--text-mute)}
.card-body{padding:18px}

/* ---------- KPI cards ---------- */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.kpi{position:relative;background:linear-gradient(180deg,var(--surface),var(--bg-raised));border:1px solid var(--border);border-radius:var(--r-md);padding:15px 16px 14px;overflow:hidden;transition:border-color var(--fast),transform var(--fast)}
.kpi:hover{border-color:var(--border-strong);transform:translateY(-2px)}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent-color,var(--brand));opacity:.85}
.kpi-top{display:flex;align-items:center;justify-content:space-between}
.kpi-label{font-size:11.5px;color:var(--text-mute);font-weight:600;letter-spacing:.01em;text-transform:uppercase;font-size:10px;letter-spacing:.07em}
.kpi-ic{width:15px;height:15px;color:var(--accent-color,var(--text-mute));opacity:.8}
.kpi-value{font-family:var(--mono);font-size:29px;font-weight:600;letter-spacing:-.02em;margin-top:9px;line-height:1}
.kpi-value small{font-size:14px;color:var(--text-mute);font-weight:500}
.kpi-foot{display:flex;align-items:center;justify-content:space-between;margin-top:9px;gap:8px}
.delta{font-family:var(--mono);font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:var(--r-pill)}
.delta.up{color:var(--good);background:var(--good-bg)}
.delta.down{color:var(--bad);background:var(--bad-bg)}
.delta.flat{color:var(--text-mute);background:var(--surface-2)}
.kpi-note{font-family:var(--mono);font-size:10px;color:var(--text-faint)}
.spark{height:26px;width:78px}

/* ---------- pills / badges ---------- */
.badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:500;
  padding:3px 9px;border-radius:var(--r-pill);background:var(--surface-2);color:var(--text-dim);border:1px solid transparent;white-space:nowrap}
.badge .d{width:6px;height:6px;border-radius:50%;background:currentColor;flex:0 0 6px}
.badge.lg{font-size:12px;padding:4px 11px}

/* status color helpers (set by JS via --c / --cb) */
.badge[data-c]{color:var(--c);background:var(--cb);border-color:color-mix(in srgb,var(--c) 24%,transparent)}

/* ---------- meter ---------- */
.meter{height:9px;border-radius:99px;background:var(--surface-3);overflow:hidden;position:relative}
.meter-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#F7C766);transition:width .6s cubic-bezier(.2,.7,.2,1)}
.meter.brand .meter-fill{background:linear-gradient(90deg,var(--brand),var(--brand-bright))}
.meter.good .meter-fill{background:linear-gradient(90deg,var(--good),#6fe6b6)}

/* ---------- tables ---------- */
.tbl-wrap{overflow:auto;border-radius:0 0 var(--r-lg) var(--r-lg)}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl thead th{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-mute);
  text-align:left;padding:11px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg-raised);font-weight:500;white-space:nowrap}
.tbl thead th.sortable{cursor:pointer;user-select:none}
.tbl thead th.sortable:hover{color:var(--text)}
.tbl thead th .arr{opacity:.5;margin-left:4px}
.tbl tbody td{padding:12px 16px;border-bottom:1px solid var(--border-soft);vertical-align:middle}
.tbl tbody tr{transition:background var(--fast)}
.tbl tbody tr:hover{background:var(--surface)}
.tbl tbody tr.clickable{cursor:pointer}
.tbl tbody tr:last-child td{border-bottom:none}
.cell-mono{font-family:var(--mono);font-size:12px;color:var(--text-dim)}
.cell-strong{font-weight:600}
.cell-dim{color:var(--text-mute)}
.dom{font-family:var(--mono);font-size:12.5px;color:var(--text);font-weight:500}
.score-chip{font-family:var(--mono);font-weight:600;font-size:12px;padding:2px 8px;border-radius:var(--r-xs);display:inline-block;min-width:34px;text-align:center}

/* expandable run rows */
.run-detail{background:#0B1015;border-bottom:1px solid var(--border-soft)}
.run-detail td{padding:0}
.run-detail .inner{padding:14px 18px;display:none}
.run-detail.open .inner{display:block}
.err-json{font-family:var(--mono);font-size:11.5px;color:#ffb9c4;background:rgba(251,111,132,.07);border:1px solid rgba(251,111,132,.2);border-radius:var(--r-sm);padding:12px 14px;white-space:pre-wrap;overflow:auto;line-height:1.6}

/* ---------- the ENGINE (signature) ---------- */
.engine-wrap{position:relative;background:
   radial-gradient(700px 200px at 30% 0%, rgba(124,118,255,.10), transparent 70%),
   linear-gradient(180deg,var(--surface),#0B1016);
   border:1px solid var(--border);border-radius:var(--r-lg);padding:20px 22px 18px;overflow:hidden}
.engine-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.engine-flow{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding-bottom:6px}
.enode{flex:1;min-width:96px;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;cursor:default}
.enode .ring{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;position:relative;
  background:radial-gradient(circle at 50% 35%, color-mix(in srgb,var(--sc) 26%,#0d1219), #0c1118);
  border:1.5px solid color-mix(in srgb,var(--sc) 60%,transparent);
  box-shadow:0 0 18px -6px color-mix(in srgb,var(--sc) 70%,transparent), inset 0 0 12px -6px color-mix(in srgb,var(--sc) 60%,transparent)}
.enode .ring .ic{width:20px;height:20px;color:var(--sc)}
.enode .cnt{font-family:var(--mono);font-size:18px;font-weight:600;margin-top:11px;color:var(--text)}
.enode .nm{font-size:10.5px;color:var(--text-mute);margin-top:1px;font-weight:600;letter-spacing:.02em}
.enode .nm small{display:block;font-family:var(--mono);font-size:9px;color:var(--text-faint);font-weight:400;letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.epipe{flex:0 0 30px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:18px;position:relative}
.epipe svg{overflow:visible}
.epipe .drop{font-family:var(--mono);font-size:9.5px;color:var(--text-faint);margin-top:6px}
.epipe .drop.warn{color:var(--accent)}
@keyframes flowdash{to{stroke-dashoffset:-16}}
.flowline{stroke-dasharray:3 5;animation:flowdash 1s linear infinite}
.engine-foot{display:flex;align-items:center;gap:18px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border-soft);flex-wrap:wrap}
.ef-item{display:flex;flex-direction:column;gap:2px}
.ef-item .l{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint)}
.ef-item .v{font-family:var(--mono);font-size:14px;font-weight:600}

/* ---------- stage health strip ---------- */
.stage-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.shealth{background:linear-gradient(180deg,var(--surface),var(--bg-raised));border:1px solid var(--border);border-radius:var(--r-md);padding:13px 14px;transition:all var(--fast);cursor:pointer}
.shealth:hover{border-color:var(--border-strong);transform:translateY(-2px)}
.shealth-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.shealth-top .nm{font-weight:600;font-size:12.5px}
.shealth-top .st{margin-left:auto;width:8px;height:8px;border-radius:50%}
.st.ok{background:var(--good);box-shadow:0 0 8px var(--good)}
.st.warn{background:var(--accent);box-shadow:0 0 8px var(--accent)}
.st.err{background:var(--bad);box-shadow:0 0 8px var(--bad)}
.st.off{background:var(--text-faint)}
.shealth-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--text-mute);margin-top:4px}
.shealth-row b{color:var(--text-dim);font-weight:500}
.shealth.disabled{opacity:.62}
.next-bar{height:4px;border-radius:99px;background:var(--surface-3);margin-top:11px;overflow:hidden}
.next-bar i{display:block;height:100%;background:var(--brand);border-radius:99px}

/* ---------- charts (svg) ---------- */
.legend{display:flex;flex-wrap:wrap;gap:7px 14px;margin-top:6px}
.legend .li{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-dim)}
.legend .sw{width:10px;height:10px;border-radius:3px}
.legend .va{font-family:var(--mono);color:var(--text);margin-left:2px}
.bar-row{display:flex;align-items:center;gap:12px;padding:7px 0}
.bar-row .lab{width:120px;font-size:12px;color:var(--text-dim);text-align:right;flex:0 0 120px;display:flex;align-items:center;gap:6px;justify-content:flex-end}
.bar-track{flex:1;height:22px;background:var(--surface-3);border-radius:var(--r-xs);overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:var(--r-xs);display:flex;align-items:center;justify-content:flex-end;padding-right:8px;
  font-family:var(--mono);font-size:11px;color:#0b0f14;font-weight:600;min-width:24px;transition:width .7s cubic-bezier(.2,.7,.2,1)}
.bar-row .pct{width:48px;font-family:var(--mono);font-size:11px;color:var(--text-mute);flex:0 0 48px}

/* histogram */
.hist{display:flex;align-items:flex-end;gap:5px;height:160px;padding-top:10px;position:relative}
.hbar{flex:1;border-radius:5px 5px 0 0;position:relative;transition:all var(--fast);min-height:3px;
  background:linear-gradient(180deg,var(--enrich),color-mix(in srgb,var(--enrich) 40%,#0c1219))}
.hbar.q{background:linear-gradient(180deg,var(--good),color-mix(in srgb,var(--good) 40%,#0c1219))}
.hbar:hover{filter:brightness(1.25)}
.hbar .ht{position:absolute;top:-19px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:10px;color:var(--text-dim)}
.hist-x{display:flex;gap:5px;margin-top:7px}
.hist-x span{flex:1;text-align:center;font-family:var(--mono);font-size:9px;color:var(--text-faint)}
.qline{position:absolute;top:0;bottom:24px;width:2px;background:repeating-linear-gradient(180deg,var(--good),var(--good) 4px,transparent 4px,transparent 8px);z-index:3}
.qline span{position:absolute;top:-2px;left:6px;font-family:var(--mono);font-size:9.5px;color:var(--good);white-space:nowrap;background:var(--bg);padding:1px 5px;border-radius:4px;border:1px solid var(--good-bg)}

/* donut */
.donut-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.donut{position:relative;flex:0 0 168px}
.donut .center{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.donut .center .big{font-family:var(--mono);font-size:24px;font-weight:600}
.donut .center .lab{font-size:10px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono)}

/* reachability matrix */
.matrix{display:grid;grid-template-columns:auto 1fr 1fr;grid-template-rows:auto 1fr 1fr;gap:8px;max-width:520px}
.mx-cell{border-radius:var(--r-md);padding:16px;display:flex;flex-direction:column;justify-content:center;border:1px solid var(--border);background:var(--surface)}
.mx-cell .n{font-family:var(--mono);font-size:24px;font-weight:600}
.mx-cell .l{font-size:11px;color:var(--text-mute);margin-top:3px}
.mx-cell .pc{font-family:var(--mono);font-size:11px;margin-top:6px}
.mx-axis{display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.07em;text-align:center}
.mx-axis.v{writing-mode:vertical-rl;transform:rotate(180deg)}

/* ---------- forms / config ---------- */
.cfg-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;align-items:start}
.stage-cfg{display:flex;flex-direction:column;gap:2px}
.cfg-row{display:flex;align-items:center;gap:14px;padding:13px 16px;border-bottom:1px solid var(--border-soft)}
.cfg-row:last-child{border-bottom:none}
.cfg-name{flex:0 0 168px;display:flex;align-items:center;gap:10px}
.cfg-name .ic{width:16px;height:16px;color:var(--sc,var(--text-mute))}
.cfg-name .t{font-weight:600;font-size:13px}
.cfg-name .t small{display:block;font-family:var(--mono);font-size:9.5px;color:var(--text-faint);font-weight:400;letter-spacing:.05em;text-transform:uppercase}
.cfg-controls{flex:1;display:flex;align-items:center;gap:20px;justify-content:flex-end;flex-wrap:wrap}
.ctrl{display:flex;flex-direction:column;gap:5px;min-width:130px}
.ctrl .cl{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-mute);display:flex;justify-content:space-between;gap:10px}
.ctrl .cl b{color:var(--brand-bright);font-weight:600}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:99px;background:var(--surface-3);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--brand-bright);cursor:pointer;box-shadow:0 0 0 4px var(--brand-ghost);transition:transform var(--fast)}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}
input[type=range]::-moz-range-thumb{width:15px;height:15px;border:none;border-radius:50%;background:var(--brand-bright);cursor:pointer;box-shadow:0 0 0 4px var(--brand-ghost)}

.switch{position:relative;width:38px;height:22px;flex:0 0 38px}
.switch input{opacity:0;width:0;height:0}
.switch .tk{position:absolute;inset:0;background:var(--surface-3);border-radius:99px;transition:all var(--med);border:1px solid var(--border)}
.switch .tk::before{content:"";position:absolute;width:16px;height:16px;border-radius:50%;background:var(--text-mute);left:3px;top:2px;transition:all var(--med)}
.switch input:checked + .tk{background:linear-gradient(90deg,var(--brand-deep),var(--brand))}
.switch input:checked + .tk::before{transform:translateX(16px);background:#fff}
.switch.danger input:checked + .tk{background:linear-gradient(90deg,#c2603c,var(--accent))}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12px;color:var(--text-dim);font-weight:600}
.input,.select{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none;transition:all var(--fast)}
.input:focus,.select:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-ghost)}
.preset-row{display:flex;gap:8px}
.preset{flex:1;padding:11px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface);text-align:center;transition:all var(--fast)}
.preset:hover{border-color:var(--border-strong)}
.preset.sel{border-color:var(--brand);background:var(--brand-ghost)}
.preset .pn{font-weight:700;font-size:13px}
.preset .pd{font-family:var(--mono);font-size:9.5px;color:var(--text-mute);margin-top:2px}

.cost-calc{position:sticky;top:84px}
.cost-big{font-family:var(--mono);font-size:34px;font-weight:600;letter-spacing:-.02em}
.cost-big small{font-size:15px;color:var(--text-mute)}
.cost-line{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:13px}
.cost-line:last-child{border-bottom:none}
.cost-line .cl-l{display:flex;align-items:center;gap:8px;color:var(--text-dim)}
.cost-line .cl-v{font-family:var(--mono);font-weight:600}
.warn-box{display:flex;gap:10px;padding:12px 14px;border-radius:var(--r-sm);background:var(--accent-soft);border:1px solid rgba(245,177,61,.3);font-size:12.5px;color:#f5cd8a;margin-top:14px}

/* ---------- ingest ---------- */
.drop-zone{border:1.5px dashed var(--border-strong);border-radius:var(--r-lg);padding:40px;text-align:center;transition:all var(--fast);background:var(--bg-raised);cursor:pointer}
.drop-zone:hover{border-color:var(--brand);background:var(--brand-ghost)}
.dz-ic{width:46px;height:46px;border-radius:var(--r-md);background:var(--brand-ghost);display:grid;place-items:center;margin:0 auto 14px;color:var(--brand-bright)}
.ing-step{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border-soft)}
.ing-step:last-child{border-bottom:none}
.ing-num{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);display:grid;place-items:center;font-family:var(--mono);font-size:12px;color:var(--text-mute);flex:0 0 26px}
.ing-step.done .ing-num{background:var(--good-bg);border-color:var(--good);color:var(--good)}
.ing-step.active .ing-num{background:var(--brand);border-color:var(--brand);color:#fff}
.val-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-sm);font-size:12.5px;margin-bottom:7px}
.val-row.ok{background:var(--good-bg);color:#8af0c4}
.val-row.warn{background:var(--accent-soft);color:#f5cd8a}
.val-row.err{background:var(--bad-bg);color:#ffb3bf}

/* ---------- health ---------- */
.sys-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.sys-card{background:linear-gradient(180deg,var(--surface),var(--bg-raised));border:1px solid var(--border);border-radius:var(--r-md);padding:16px}
.sys-card .sh{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.sys-card .sh .nm{font-weight:600;font-size:12.5px}
.sys-card .sv{font-family:var(--mono);font-size:22px;font-weight:600}
.sys-card .sm{font-family:var(--mono);font-size:11px;color:var(--text-mute);margin-top:3px}
.alert-item{display:flex;gap:13px;padding:13px 16px;border-bottom:1px solid var(--border-soft)}
.alert-item:last-child{border-bottom:none}
.alert-ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:0 0 30px}
.alert-ic.err{background:var(--bad-bg);color:var(--bad)}
.alert-ic.warn{background:var(--accent-soft);color:var(--accent)}
.alert-ic.info{background:var(--clean-bg);color:var(--clean)}
.alert-body{flex:1;min-width:0}
.alert-body .at{font-size:13px;font-weight:600}
.alert-body .ad{font-size:12px;color:var(--text-mute);margin-top:2px}
.alert-time{font-family:var(--mono);font-size:10.5px;color:var(--text-faint);white-space:nowrap}

.hc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.hcard{background:linear-gradient(180deg,var(--surface),var(--bg-raised));border:1px solid var(--border);border-radius:var(--r-md);padding:16px;border-top:2px solid var(--sc,var(--brand))}
.hcard .hh{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.hcard .hh .ic{width:16px;height:16px;color:var(--sc)}
.hcard .hh .nm{font-weight:700;font-size:13px}
.hcard .hr{display:flex;justify-content:space-between;font-size:12px;color:var(--text-mute);margin:6px 0}
.hcard .hr b{font-family:var(--mono);color:var(--text-dim);font-weight:500}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(6,9,13,.72);backdrop-filter:blur(6px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:46px 20px;overflow-y:auto}
.overlay.open{display:flex;animation:fade .2s ease}
.modal{background:linear-gradient(180deg,var(--surface),var(--bg-raised));border:1px solid var(--border-strong);border-radius:var(--r-xl);width:100%;max-width:860px;box-shadow:var(--shadow-pop);animation:rise .3s cubic-bezier(.2,.7,.2,1)}
.modal.sm{max-width:460px}
@keyframes rise{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:flex-start;gap:14px;padding:20px 22px;border-bottom:1px solid var(--border-soft)}
.modal-head .mt{font-size:17px;font-weight:700;letter-spacing:-.01em}
.modal-head .ms{font-family:var(--mono);font-size:11.5px;color:var(--text-mute);margin-top:3px}
.modal-x{margin-left:auto;width:30px;height:30px;border-radius:var(--r-sm);border:1px solid var(--border);display:grid;place-items:center;color:var(--text-mute);background:var(--surface);transition:all var(--fast)}
.modal-x:hover{color:var(--text);background:var(--surface-2)}
.modal-body{padding:22px}
.modal-foot{display:flex;justify-content:flex-end;gap:9px;padding:16px 22px;border-top:1px solid var(--border-soft)}

/* drilldown internals */
.dd-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:18px}
.dd-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:15px}
.dd-card h4{margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-mute);font-family:var(--mono);font-weight:500;display:flex;align-items:center;gap:7px}
.kv{display:flex;justify-content:space-between;gap:14px;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border-soft)}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--text-mute)}
.kv .v{font-family:var(--mono);color:var(--text);text-align:right;word-break:break-all}
.verif{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--good);font-family:var(--mono)}

.timeline{position:relative;padding-left:8px}
.tl-item{display:flex;gap:14px;padding-bottom:16px;position:relative}
.tl-item:last-child{padding-bottom:0}
.tl-rail{flex:0 0 18px;display:flex;flex-direction:column;align-items:center}
.tl-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--sc,var(--brand));background:var(--bg);z-index:2;margin-top:2px}
.tl-dot.fill{background:var(--sc,var(--brand))}
.tl-line{flex:1;width:2px;background:var(--border-strong);margin:2px 0 -16px}
.tl-item:last-child .tl-line{display:none}
.tl-content{flex:1;padding-bottom:2px}
.tl-content .ts{font-family:var(--mono);font-size:10.5px;color:var(--text-faint)}
.tl-content .st{font-weight:600;font-size:13px;margin-top:1px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tl-content .meta{font-family:var(--mono);font-size:11px;color:var(--text-mute);margin-top:2px}

.prov{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-soft);font-size:12px}
.prov:last-child{border-bottom:none}
.prov .pv-src{font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:var(--r-xs);background:var(--surface-2);color:var(--text-dim);flex:0 0 auto}
.prov .pv-hit{margin-left:auto;font-family:var(--mono);font-size:11px}

.accordion{border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;margin-top:14px}
.acc-head{display:flex;align-items:center;gap:9px;padding:11px 14px;cursor:pointer;font-size:12.5px;font-weight:600;background:var(--surface)}
.acc-head .chev{margin-left:auto;transition:transform var(--fast)}
.accordion.open .acc-head .chev{transform:rotate(90deg)}
.acc-body{display:none;padding:0}
.accordion.open .acc-body{display:block}
.acc-body pre{margin:0;padding:14px;font-family:var(--mono);font-size:11px;color:var(--text-dim);background:#0a0e13;overflow:auto;line-height:1.6;max-height:260px}

/* filters rail */
.ops-layout{display:grid;grid-template-columns:230px 1fr;gap:16px;align-items:start}
.filter-rail{position:sticky;top:84px;display:flex;flex-direction:column;gap:4px}
.fr-group{padding:14px 0;border-bottom:1px solid var(--border-soft)}
.fr-group:last-child{border-bottom:none}
.fr-title{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mute);margin-bottom:10px}
.chk{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:12.5px;color:var(--text-dim);cursor:pointer}
.chk input{accent-color:var(--brand)}
.chk .ct{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--text-faint)}
.chk:hover{color:var(--text)}

/* design-system page */
.ds-section{margin-bottom:30px}
.ds-h{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--brand-bright);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border-soft)}
.swatches{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.sw-card{border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;background:var(--surface)}
.sw-chip{height:62px}
.sw-meta{padding:9px 11px}
.sw-meta .sn{font-size:12px;font-weight:600}
.sw-meta .sx{font-family:var(--mono);font-size:10px;color:var(--text-mute);text-transform:uppercase}
.type-spec{display:flex;align-items:baseline;gap:16px;padding:12px 0;border-bottom:1px solid var(--border-soft)}
.type-spec .tlabel{flex:0 0 150px;font-family:var(--mono);font-size:10.5px;color:var(--text-mute)}
.radius-demo{display:flex;gap:16px;flex-wrap:wrap}
.rd{text-align:center}
.rd .box{width:70px;height:54px;background:var(--brand-ghost);border:1px solid var(--brand);margin-bottom:7px}
.rd .l{font-family:var(--mono);font-size:10px;color:var(--text-mute)}
.comp-row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;padding:14px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface);margin-bottom:12px}

/* toast */
.toast-zone{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:flex-start;gap:11px;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:var(--r-md);padding:13px 15px;min-width:300px;max-width:380px;box-shadow:var(--shadow-pop);animation:slidein .3s cubic-bezier(.2,.7,.2,1)}
@keyframes slidein{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}
.toast.success{border-left:3px solid var(--good)}
.toast.warn{border-left:3px solid var(--accent)}
.toast.error{border-left:3px solid var(--bad)}
.toast .ti{font-size:13px;font-weight:600}
.toast .td{font-size:12px;color:var(--text-mute);margin-top:2px}

.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.section-gap{margin-top:16px}
.hr{height:1px;background:var(--border-soft);margin:18px 0}
.muted{color:var(--text-mute)}
.tnum{font-family:var(--mono);font-feature-settings:"tnum" 1}

@media (max-width:1180px){
  .kpis{grid-template-columns:repeat(3,1fr)}
  .stage-strip,.hc-grid{grid-template-columns:repeat(3,1fr)}
  .sys-grid{grid-template-columns:repeat(2,1fr)}
  .cfg-grid,.dd-grid,.two,.three,.ops-layout{grid-template-columns:1fr}
  .filter-rail,.cost-calc{position:static}
}
@media (max-width:760px){
  .sidebar{display:none}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .search{display:none}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;transition-duration:.001ms!important}
  .flowline{animation:none}
}
/* ---------- alignment & icon-sizing fixes ---------- */
svg{vertical-align:middle}
.ic>svg,.kpi-ic>svg{width:100%;height:100%;display:block}
.badge,.score-chip{vertical-align:middle}
.warn-box{align-items:flex-start}
.warn-box>svg{margin-top:1px;flex:0 0 auto}
.dd-card h4>svg{width:13px;height:13px;flex:0 0 13px}
.bar-row .lab{width:178px;flex-basis:178px}
.tbl td svg,.btn>svg,.val-row>svg,.cost-line svg,.prov svg,.alert-ic>svg,.head-actions svg,.card-meta svg,.live svg,.crumbs svg{flex:0 0 auto}
</style>
</head>
<body>
<div id="root"></div>
<div class="overlay" id="overlay"></div>
<div class="toast-zone" id="toasts"></div>
<script>
/* ============================================================ ICONS */

grid:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg>',

logs:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>',
people:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M16 6a3 3 0 010 6M21 20c0-2.5-1.5-4.7-3.5-5.6"/></svg>',

   '<div class="card pad section-gap"><div class="card-title" style="font-size:13px;margin-bottom:14px">'+I.shield+' Quality gates</div><div class="ctrl" style="min-width:auto;margin-bottom:16px"><div class="cl">Minimum score to qualify <b id="vMinScore">55</b></div><input type="range" min="0" max="100" value="55" id="minScore"></div><div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--border-soft)"><div><div style="font-weight:600;font-size:13px">Require verified email</div><div class="muted" style="font-size:11.5px">Only sync operators with a verified work email</div></div><label class="switch"><input type="checkbox"><span class="tk"></span></label></div><div class="field" style="margin-top:12px"><label>Daily Clay budget (rows)</label><input class="input" value="100" id="clayBudget"></div></div>';
 const right='<div class="card pad cost-calc"><div class="eyebrow">Live estimate</div><div class="cost-big" id="costDaily">$0.00<small> / day</small></div><div class="mono" style="font-size:11px;color:var(--text-mute);margin-top:2px">at current settings</div><div style="margin:18px 0 6px">'+
   '<div class="cost-line"><span class="cl-l">'+I.sparkles+' Clay enrichment</span><span class="cl-v" id="costClay">$0.00</span></div>'+
   '<div class="cost-line"><span class="cl-l">'+I.target+' Name enrich</span><span class="cl-v" id="costName">$0.00</span></div>'+
   '<div class="cost-line"><span class="cl-l">'+I.broom+' Clean (LLM)</span><span class="cl-v" id="costClean">$0.00</span></div></div>'+
   '<div class="hr"></div><div style="display:flex;justify-content:space-between"><span class="muted">Weekly</span><b class="mono" id="costWeek">$0.00</b></div><div style="display:flex;justify-content:space-between;margin-top:8px"><span class="muted">Monthly</span><b class="mono" id="costMonth">$0.00</b></div><div id="costWarn"></div><button class="btn primary" style="width:100%;margin-top:18px;justify-content:center" data-act="saveconfig">Save configuration</button><div class="muted" style="font-size:11px;text-align:center;margin-top:8px">Clay push is OFF by default for safety</div></div>';
 return '<section class="page" data-pg="config"><div class="page-head"><div><div class="eyebrow">Controls</div><div class="h1">Configuration</div><div class="sub">Tune batch sizes, intervals, and quality gates. The cost estimate updates live so you never enable spend blindly — Clay push stays gated behind a confirmation.</div></div></div><div class="cfg-grid"><div class="stage-cfg">'+left+'</div>'+right+'</div></section>';
}

/* ============================================================ PAGE: DESIGN SYSTEM */
function pageDesign(){
 const ink=[['--bg','#0A0D12'],['--surface','#121821'],['--surface-2','#172029'],['--border','#222C38'],['--border-strong','#30404F'],['--text','#EAEEF4']];
 const brand=[['brand','#7C76FF'],['brand-bright','#9D98FF'],['accent','#F5B13D']];
 const stagesC=[['raw','#5E6E83'],['clean','#4FA0F0'],['ready','#38BDF8'],['enrich','#8B7BFF'],['pending','#F5B13D'],['scored','#5FD0C0'],['good','#35D399'],['synced','#22D3EE'],['bad','#FB6F84']];
 const sw=arr=>'<div class="swatches">'+arr.map(s=>'<div class="sw-card"><div class="sw-chip" style="background:'+s[1]+'"></div><div class="sw-meta"><div class="sn">'+s[0]+'</div><div class="sx">'+s[1]+'</div></div></div>').join('')+'</div>';
 const radii=[['xs','6px'],['sm','9px'],['md','13px'],['lg','17px'],['xl','22px'],['pill','999px']];
 const radHtml='<div class="radius-demo">'+radii.map(r=>'<div class="rd"><div class="box" style="border-radius:'+r[1]+'"></div><div class="l">'+r[0]+' · '+r[1]+'</div></div>').join('')+'</div>';
 const badgesDemo=['raw','clean','ready_to_enrich','clay_pending','enriched','qualified','synced','disqualified'].map(k=>badge(k,k)).join(' ')+'<br><br>'+['clay_full','clay_email','clay_phone','clay_linkedin','clay_no_data'].map(k=>badge(k,k)).join(' ');
 const typeSpecs=[
  ['Display / 800','<div style="font-size:26px;font-weight:800;letter-spacing:-.03em">Autonomous lead refinery</div>'],
  ['Page title / 800','<div style="font-size:22px;font-weight:800;letter-spacing:-.02em">Pipeline Overview</div>'],
  ['Section / 700','<div style="font-size:16px;font-weight:700">Enrichment quality tiers</div>'],
  ['Body / 400','<div style="font-size:14px">Raw STR operator data, refined into qualified leads.</div>'],
  ['Eyebrow · mono / 600','<div class="mono" style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brand-bright)">Mission control</div>'],
  ['Data · mono / 600','<div class="mono" style="font-size:22px;font-weight:600">610 · $0.41 · 27.4% · op_4471</div>']
 ].map(t=>'<div class="type-spec"><div class="tlabel">'+t[0]+'</div>'+t[1]+'</div>').join('');
 return '<section class="page" data-pg="design"><div class="page-head"><div><div class="eyebrow">Foundations</div><div class="h1">Design system</div><div class="sub">"Operator\'s console" — a dark, instrument-grade system for an always-on engine. Plus Jakarta Sans carries the UI; IBM Plex Mono carries every number, ID, and status code.</div></div></div>'+
  '<div class="ds-section"><div class="ds-h">Color · ink &amp; surfaces</div>'+sw(ink)+'</div>'+
  '<div class="ds-section"><div class="ds-h">Color · brand &amp; accent</div><p class="muted" style="font-size:13px;margin:-6px 0 14px;max-width:70ch">Violet signals the AI/autonomous core and drives primary actions &amp; the live heartbeat. Amber is the engine\'s "heat" — throughput, spend, and the cost meter. Green is reserved for healthy/qualified, never for brand.</p>'+sw(brand)+'</div>'+
  '<div class="ds-section"><div class="ds-h">Color · pipeline-stage spectrum</div><p class="muted" style="font-size:13px;margin:-6px 0 14px;max-width:70ch">A disciplined cool→warm→green progression mapped 1:1 onto the state machine, so a row\'s color tells you where it is: raw (cold grey) → processing (blue/violet/amber) → qualified (green) → synced (cyan).</p>'+sw(stagesC)+'</div>'+
  '<div class="two"><div class="card pad"><div class="ds-h" style="margin-top:0">Typography</div>'+typeSpecs+'</div>'+
  '<div class="card pad"><div class="ds-h" style="margin-top:0">Radius</div>'+radHtml+'<div class="ds-h" style="margin-top:26px">Elevation</div><div style="display:flex;gap:16px;flex-wrap:wrap"><div style="flex:1;min-width:120px;height:70px;border-radius:13px;background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-1);display:grid;place-items:center" class="mono muted">card</div><div style="flex:1;min-width:120px;height:70px;border-radius:13px;background:var(--surface-2);box-shadow:var(--shadow-pop);display:grid;place-items:center" class="mono muted">modal</div></div></div></div>'+
  '<div class="ds-section section-gap"><div class="ds-h">Components · status badges</div><div class="card pad" style="line-height:2.6">'+badgesDemo+'</div></div>'+
  '<div class="ds-section"><div class="ds-h">Components · controls</div><div class="comp-row"><button class="btn primary">'+I.play+' Primary</button><button class="btn accent">'+I.bolt+' Accent</button><button class="btn">Secondary</button><button class="btn danger">'+I.warn+' Danger</button><button class="btn ghost">Ghost</button></div>'+
  '<div class="comp-row"><label class="switch"><input type="checkbox" checked><span class="tk"></span></label><label class="switch"><input type="checkbox"><span class="tk"></span></label><label class="switch danger"><input type="checkbox" checked><span class="tk"></span></label><div style="flex:1;max-width:200px"><div class="meter"><div class="meter-fill" style="width:62%"></div></div></div><div style="flex:1;max-width:200px"><div class="meter brand"><div class="meter-fill" style="width:40%"></div></div></div><input class="input" style="max-width:160px" value="op_4471"><select class="select"><option>band A</option></select></div></div></section>';
}
</script>
<script>
/* ============================================================ SHELL + MOUNT */
const NAV=[
 {sec:'Monitor'},
 {p:'overview',ic:I.grid,t:'Overview'},
 {p:'funnel',ic:I.funnel,t:'Funnel'},
 {p:'health',ic:I.pulse,t:'Health',badge:'2',alert:1},
 {p:'logs',ic:I.logs,t:'Run Log'},
 {sec:'Operate'},
 {p:'operators',ic:I.people,t:'Operators',badge:'610'},
 {p:'ingest',ic:I.upload,t:'Ingest'},
 {p:'config',ic:I.sliders,t:'Configuration'},
 {sec:'System'},
 {p:'design',ic:I.swatch,t:'Design System'}
];
const CRUMB={overview:'Overview',funnel:'Funnel',health:'Health',logs:'Run Log',operators:'Operators',ingest:'Ingest',config:'Configuration',design:'Design System'};
let pendingClay=null;

function mount(){
 const navHtml=NAV.map(n=>n.sec?'<div class="nav-label">'+n.sec+'</div>':'<a class="nav-item'+(n.p==='overview'?' active':'')+'" data-page="'+n.p+'"><span class="ic">'+n.ic+'</span>'+n.t+(n.badge?'<span class="nav-badge'+(n.alert?' alert':'')+'">'+n.badge+'</span>':'')+'</a>').join('');
 const sidebar='<aside class="sidebar"><div class="brand"><div class="brand-mark"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 17l5-5-5-5M12 19h8" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div><div class="brand-name">Cendra</div><div class="brand-sub">GTM Engine</div></div></div><nav class="nav">'+navHtml+'</nav><div class="sidebar-foot"><div class="user-chip"><div class="avatar">C</div><div><div class="nm">Can</div><div class="rl">SALES OPS</div></div></div></div></aside>';
 const topbar='<header class="topbar"><div class="crumbs"><span>Engine</span><span class="sep">/</span><span class="here" id="crumb">Overview</span></div><div class="search">'+I.search+'<input placeholder="Search operators, domains, runs…"><kbd>⌘K</kbd></div><div class="top-right"><div class="live"><span class="dot"></span>Scheduler <b>running</b> · next <span class="mono" id="nextrun">clean 4m</span></div><label class="refresh-toggle"><span class="switch" style="width:34px;height:20px"><input type="checkbox" id="autoref" checked><span class="tk"></span></span>Live</label><button class="icon-btn">'+I.bell+'</button></div></header>';
 const pages=pageOverview()+pageFunnel()+pageHealth()+pageLogs()+pageOperators()+pageIngest()+pageConfig()+pageDesign();
 document.getElementById('root').innerHTML=sidebar+'<div class="main">'+topbar+'<div id="pages">'+pages+'</div></div>';
 recomputeCost();
 wire();
}

/* ============================================================ NAV */
function navTo(p){
 $$('.page').forEach(el=>el.classList.toggle('active',el.dataset.pg===p));
 $$('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===p));
 const c=$('#crumb');if(c)c.textContent=CRUMB[p]||p;
 window.scrollTo({top:0,behavior:'smooth'});
}

/* ============================================================ MODAL / TOAST */
const overlay=document.getElementById('overlay');
function openModal(o){
 overlay.innerHTML='<div class="modal '+(o.size||'')+'"><div class="modal-head"><div style="flex:1"><div class="mt">'+o.title+'</div>'+((o.sub||o.badge)?'<div class="ms" style="display:flex;align-items:center;gap:10px;margin-top:6px">'+(o.sub||'')+(o.badge||'')+'</div>':'')+'</div><button class="modal-x" data-close>'+I.x+'</button></div><div class="modal-body">'+o.body+'</div>'+(o.foot?'<div class="modal-foot">'+o.foot+'</div>':'')+'</div>';
 overlay.classList.add('open');
}
function closeModal(){overlay.classList.remove('open');setTimeout(()=>{overlay.innerHTML=''},220);pendingClay=null;}
function toast(type,title,desc){
 const z=document.getElementById('toasts');
 const t=document.createElement('div');t.className='toast '+type;
 const ic=type==='success'?I.check:type==='warn'?I.bolt:I.warn;
 const cc=type==='success'?'good':type==='warn'?'accent':'bad';
 t.innerHTML='<div style="width:18px;height:18px;flex:0 0 18px;color:var(--'+cc+')">'+ic+'</div><div style="flex:1"><div class="ti">'+title+'</div>'+(desc?'<div class="td">'+desc+'</div>':'')+'</div>';
 z.appendChild(t);
 setTimeout(()=>{t.style.transition='opacity .3s,transform .3s';t.style.opacity='0';t.style.transform='translateX(30px)';setTimeout(()=>t.remove(),320)},3900);
}

/* ============================================================ COST CALC */
function recomputeCost(){
 if(!document.getElementById('costDaily'))return;
 const COST={clean:0.0001,name_enrich:0.008,clay_push:0.03,score:0,sync:0};
 const v=(stage,type)=>{const el=document.querySelector('input[data-cfg="'+type+'"][data-stage="'+stage+'"]');return el?+el.value:0};
 const on=stage=>{const el=document.querySelector('input[data-toggle="'+stage+'"]');return el?el.checked:false};
 const budget=+((document.getElementById('clayBudget')||{}).value||100);
 let rows={};
 ['clean','name_enrich','clay_push','score','sync'].forEach(s=>{const rpd=1440/(v(s,'interval')||30);rows[s]=on(s)?rpd*(v(s,'batch')||0):0});
 rows.clay_push=Math.min(rows.clay_push, on('clay_push')?budget:0);
 const cClay=rows.clay_push*COST.clay_push, cName=rows.name_enrich*COST.name_enrich, cClean=rows.clean*COST.clean;
 const daily=cClay+cName+cClean;
 const f=n=>'$'+n.toFixed(2);
 document.getElementById('costDaily').innerHTML=f(daily)+'<small> / day</small>';
 document.getElementById('costClay').textContent=f(cClay);
 document.getElementById('costName').textContent=f(cName);
 document.getElementById('costClean').textContent=f(cClean);
 document.getElementById('costWeek').textContent=f(daily*7);
 document.getElementById('costMonth').textContent=f(daily*30);
 const w=document.getElementById('costWarn');
 w.innerHTML=daily>50?'<div class="warn-box" style="margin-top:14px">'+I.warn+'<div>High projected spend ('+f(daily)+'/day). Review batch sizes and Clay budget.</div></div>':'';
}

/* ============================================================ ACTIONS */
function confirmClay(cb){
 pendingClay=cb;
 openModal({title:'Enable Clay push?',sub:'⚠ Consumes your daily Clay budget',size:'sm',
  body:'<p style="font-size:13.5px;color:var(--text-dim);line-height:1.6;margin:0">Rows will be sent to Clay automatically every <b class="mono">30 min</b>, up to your daily cap. At <b class="mono">100 rows/day</b> that is roughly <b class="mono" style="color:var(--accent)">$3.00/day</b> in enrichment credits.</p><div class="warn-box" style="margin-top:14px">'+I.info+'<div>Failed enrichments still burn credits. The deliverable-email gate is active, so operators that already have a usable public inbox are skipped automatically.</div></div>',
  foot:'<button class="btn ghost" data-clay-cancel>Cancel</button><button class="btn accent" data-clay-confirm>'+I.sparkles+' Enable Clay push</button>'});
}
function copilotModal(){
 openModal({title:'Engine Copilot',sub:'2 active issues diagnosed',badge:badge('beta','enriched',true),
  body:'<div class="dd-card" style="border-color:rgba(251,111,132,.3)"><h4 style="color:var(--bad)">'+I.warn+' Sync stage — failing (3×)</h4><p style="font-size:13px;color:var(--text-dim);line-height:1.6;margin:0 0 10px">The <b>sync</b> runner is erroring on <span class="mono">SCHEMA_MISSING</span>: column <span class="mono">attio_list_entry_id</span> does not exist. 41 qualified operators are queued behind it and cannot reach Attio.</p><div style="background:#0a0e13;border:1px solid var(--border);border-radius:9px;padding:12px"><div class="mono" style="font-size:10px;color:var(--text-faint);margin-bottom:6px">SUGGESTED FIX</div><div class="mono" style="font-size:12px;color:var(--good)">alter table operators add column attio_list_entry_id text;</div></div></div>'+
  '<div class="dd-card" style="margin-top:14px;border-color:rgba(245,177,61,.3)"><h4 style="color:var(--accent)">'+I.bolt+' Clay push — approaching cap</h4><p style="font-size:13px;color:var(--text-dim);line-height:1.6;margin:0">80/100 rows consumed. At the current 30-min interval the cap is hit by ~14:55. Raise the daily budget or accept the pause — <b>75% of remaining operators have public inboxes</b> the deliverable-gate will skip anyway, so the real Clay demand is lower than the queue suggests.</p></div>',
  foot:'<button class="btn ghost" data-close>Dismiss</button><button class="btn primary" data-act="applyfix">'+I.check+' Apply migration</button>'});
}
function runIngestProgress(){
 const bar=document.getElementById('ingBar'),fill=document.getElementById('ingFill'),msg=document.getElementById('ingMsg');
 if(!bar)return;bar.style.display='block';let pct=0,chunk=1;
 const iv=setInterval(()=>{pct+=Math.random()*16+8;if(pct>=100){pct=100;clearInterval(iv);msg.textContent='Done · 283 inserted · 29 duplicates skipped';fill.style.width='100%';toast('success','Ingest complete','283 operators added to raw_operators.');setTimeout(()=>navTo('operators'),700);return;}chunk=Math.min(7,Math.ceil(pct/100*7));fill.style.width=pct+'%';msg.textContent='Chunk '+chunk+'/7 · inserting…';},260);
}

/* ============================================================ WIRING */
function wire(){
 document.addEventListener('click',e=>{
  const nav=e.target.closest('[data-page],[data-nav]');
  if(nav){const p=nav.dataset.page||nav.dataset.nav;navTo(p);return;}
  const op=e.target.closest('[data-op]');if(op){openOperator(op.dataset.op);return;}
  const run=e.target.closest('[data-run]');if(run){const d=document.getElementById('rd-'+run.dataset.run);if(d)d.classList.toggle('open');return;}
  if(e.target.closest('[data-close]')){closeModal();return;}
  if(e.target===overlay){closeModal();return;}
  if(e.target.closest('[data-clay-cancel]')){if(pendingClay)pendingClay.checked=false;closeModal();return;}
  if(e.target.closest('[data-clay-confirm]')){closeModal();recomputeCost();toast('success','Clay push enabled','Budget-gated enrichment is now live.');return;}
  const preset=e.target.closest('[data-preset]');
  if(preset){
   $$('.preset').forEach(x=>x.classList.remove('sel'));preset.classList.add('sel');
   const map={cons:{clean:[40,60],name_enrich:[60,20],clay_push:[60,10],score:[30,150],sync:[60,15]},bal:{clean:[20,100],name_enrich:[30,30],clay_push:[30,20],score:[15,200],sync:[30,20]},agg:{clean:[10,200],name_enrich:[15,50],clay_push:[15,40],score:[10,400],sync:[15,40]}}[preset.dataset.preset];
   Object.keys(map).forEach(s=>{const i=document.querySelector('input[data-cfg="interval"][data-stage="'+s+'"]'),b=document.querySelector('input[data-cfg="batch"][data-stage="'+s+'"]');if(i){i.value=map[s][0];const l=document.getElementById('vi_'+s);if(l)l.textContent=map[s][0]+'m';}if(b){b.value=map[s][1];const l=document.getElementById('vb_'+s);if(l)l.textContent=map[s][1];}});
   recomputeCost();toast('success','Preset applied',preset.querySelector('.pn').textContent+' settings loaded.');return;
  }
  const act=e.target.closest('[data-act]');
  if(act){const a=act.dataset.act;
   if(a==='cycle')toast('success','Cycle triggered','All enabled stages will run on the next tick.');
   else if(a==='export')toast('success','Export started','Your CSV is being prepared.');
   else if(a==='copilot')copilotModal();
   else if(a==='applyfix'){closeModal();toast('success','Migration applied','attio_list_entry_id added — sync will resume next tick.');}
   else if(a==='saveconfig')toast('success','Configuration saved','Changes apply on the next scheduler tick.');
   else if(a==='parse'){const pv=document.getElementById('ingPreview');if(pv){pv.style.display='block';pv.scrollIntoView({behavior:'smooth',block:'start'});}}
   else if(a==='commit')runIngestProgress();
   return;
  }
 });
 // toggles + sliders
 document.addEventListener('input',e=>{
  const t=e.target;
  if(t.dataset&&t.dataset.cfg){const s=t.dataset.stage,ty=t.dataset.cfg;const l=document.getElementById('v'+(ty==='interval'?'i':'b')+'_'+s);if(l)l.textContent=t.value+(ty==='interval'?'m':'');recomputeCost();}
  if(t.id==='minScore'){const l=document.getElementById('vMinScore');if(l)l.textContent=t.value;}
  if(t.id==='clayBudget')recomputeCost();
 });
 document.addEventListener('change',e=>{
  if(e.target.dataset&&e.target.dataset.toggle){
   if(e.target.dataset.toggle==='clay_push'&&e.target.checked){confirmClay(e.target);}
   else recomputeCost();
  }
 });
 document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
 // cosmetic live countdown
 let secs=4*60+12;
 setInterval(()=>{if(!document.getElementById('autoref')||!document.getElementById('autoref').checked)return;secs-=1;if(secs<0)secs=20*60;const m=Math.floor(secs/60),s=secs%60;const el=document.getElementById('nextrun');if(el)el.textContent='clean '+m+'m '+(s<10?'0':'')+s+'s';},1000);
}

mount();
</script>
</body>
</html>
